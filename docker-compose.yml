services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blueforge}
      POSTGRES_USER: ${POSTGRES_USER:-blueforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blueforge}
    ports:
      - "5432:5432"
    volumes:
      - blueforge-postgres-data:/var/lib/postgresql

volumes:
  blueforge-postgres-data:
