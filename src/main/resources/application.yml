spring:
  application:
    name: blueforge

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:blueforge}
    username: ${POSTGRES_USER:blueforge}
    password: ${POSTGRES_PASSWORD:blueforge}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

blueforge:
  ai:
    openrouter:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:google/gemma-4-26b-a4b-it:free}
  cors:
    allowed-origins: ${BLUEFORGE_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    api-key: ${BLUEFORGE_API_KEY:}
