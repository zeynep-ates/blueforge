spring:
  application:
    name: blueforge

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:blueforge}
    username: ${POSTGRES_USER:blueforge}
    password: ${POSTGRES_PASSWORD:blueforge}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

blueforge:
  ai:
    openrouter:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:meta-llama/llama-3.1-8b-instruct:free}
